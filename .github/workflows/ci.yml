name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "build/**"
      - "chore/**"
      - "ci/**"
      - "docs/**"
      - "perf/**"
      - "refactor/**"
      - "revert/**"
      - "style/**"
      - "test/**"
      - "claude/**"
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
