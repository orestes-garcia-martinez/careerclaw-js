name: Security Scan (VirusTotal)

on:
  release:
    types: [published]

jobs:
  vt_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: VirusTotal Scan
        uses: cssnr/virustotal-action@v1
        with:
          vt_api_key: ${{ secrets.VIRTUAL_TOTAL_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          file_globs: "careerclaw-js-*.tgz"

          # This appends the scan link directly to your Release notes
          update_release: true
          release_heading: '🛡️ **VirusTotal Security Report:**'
